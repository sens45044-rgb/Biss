<script>
// STEP 1: Product Class - Manages all product data
class Product {
    constructor() {
        this.name = "Trinity 2 Wireless Headphones";
        this.price = 799;
        this.ratings = 4.8;
        this.totalReviews = 18400;
        this.stock = 1000;
        
        this.features = [
            "Ergonomic Head Cushion",
            "Compact Swivel Design", 
            "Plush Earpads for Comfort",
            "50+ Hrs Extended Playtime with ZapCharge™",
            "10 Mins Charge = 200 Mins Playback",
            "45 ms Low Latency Gaming Mode",
            "40 mm Large Drivers with BassXpand™",
            "Dual Pairing Bluetooth v5.3",
            "MEMS Mic + AI ENC Technology",
            "Ultra-fast Type-C Charging",
            "AUX & Micro SD Support"
        ];
        
        this.colors = {
            'shark-grey': { name: 'Shark Grey', code: '#4B5563', images: ['https://images.unsplash.com/photo-1613040809559-d4e9e414678e?w=500'] },
            'blue': { name: 'Blue', code: '#3B82F6', images: ['https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=500'] },
            'green': { name: 'Green', code: '#10B981', images: ['https://images.unsplash.com/photo-1583394838336-acd977736f90?w=500'] },
            'black': { name: 'Black', code: '#1F2937', images: ['https://images.unsplash.com/photo-1519681393784-d120267933ba?w=500'] },
            'red': { name: 'Red', code: '#EF4444', images: ['https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=500'] }
        };
        
        this.reviews = [
            { user: "Rahul S.", rating: 5, comment: "Amazing sound quality! Battery lasts forever.", date: "2024-01-15" },
            { user: "Priya K.", rating: 4, comment: "Comfortable for long hours. Great value for money.", date: "2024-01-12" },
            { user: "Amit R.", rating: 5, comment: "Gaming mode is incredible! Zero lag.", date: "2024-01-10" }
        ];
    }
    
    getCurrentImage(color) {
        return this.colors[color]?.images[0] || this.colors['shark-grey'].images[0];
    }
}

// STEP 2: Shopping Cart Class
class ShoppingCart {
    constructor() {
        this.items = JSON.parse(localStorage.getItem('cart')) || [];
    }
    
    addItem(product, color, quantity = 1) {
        const existingItem = this.items.find(item => item.product === product.name && item.color === color);
        
        if (existingItem) {
            existingItem.quantity += quantity;
        } else {
            this.items.push({
                product: product.name,
                color: color,
                price: product.price,
                quantity: quantity,
                image: product.getCurrentImage(color)
            });
        }
        
        this.save();
        this.updateCartCount();
        return true;
    }
    
    removeItem(index) {
        this.items.splice(index, 1);
        this.save();
        this.updateCartCount();
        this.renderCart();
    }
    
    updateQuantity(index, quantity) {
        if (quantity <= 0) {
            this.removeItem(index);
            return;
        }
        this.items[index].quantity = quantity;
        this.save();
        this.renderCart();
    }
    
    getTotal() {
        return this.items.reduce((total, item) => total + (item.price * item.quantity), 0);
    }
    
    getItemCount() {
        return this.items.reduce((total, item) => total + item.quantity, 0);
    }
    
    save() {
        localStorage.setItem('cart', JSON.stringify(this.items));
    }
    
    updateCartCount() {
        const count = this.getItemCount();
        const badge = document.getElementById('cartCount');
        badge.textContent = count;
        badge.classList.toggle('hidden', count === 0);
    }
    
    clear() {
        this.items = [];
        this.save();
        this.updateCartCount();
    }
}

// STEP 3: Initialize App
const product = new Product();
const cart = new ShoppingCart();
let currentColor = 'shark-grey';

// Initialize UI
document.addEventListener('DOMContentLoaded', function() {
    initProductGallery();
    initColorSelector();
    renderFeatures();
    renderReviews();
    updateMainImage();
    cart.updateCartCount();
});

// STEP 4: Product Gallery (Image Carousel)
function initProductGallery() {
    const gallery = document.getElementById('productGallery');
    const mainImage = document.getElementById('mainImage');
    
    // Add click handlers for navigation buttons
    gallery.querySelector('.swiper-button-prev').addEventListener('click', () => {
        // Simulate image change (you can add more images per color)
        console.log('Previous image');
    });
    
    gallery.querySelector('.swiper-button-next').addEventListener('click', () => {
        console.log('Next image');
    });
}

function updateMainImage() {
    const mainImage = document.getElementById('mainImage');
    mainImage.src = product.getCurrentImage(currentColor);
    mainImage.alt = `${product.name} - ${product.colors[currentColor].name}`;
}

// STEP 5: Color Selector
function initColorSelector() {
    const selector = document.getElementById('colorSelector');
    
    Object.keys(product.colors).forEach(colorKey => {
        const color = product.colors[colorKey];
        const swatch = document.createElement('div');
        swatch.className = `color-swatch ${colorKey === currentColor ? 'active' : ''}`;
        swatch.style.backgroundColor = color.code;
        swatch.title = color.name;
        swatch.dataset.color = colorKey;
        
        swatch.addEventListener('click', function() {
            currentColor = colorKey;
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
            this.classList.add('active');
            updateMainImage();
        });
        
        selector.appendChild(swatch);
    });
}

// STEP 6: Features Grid
function renderFeatures() {
    const grid = document.getElementById('featuresGrid');
    product.features.forEach(feature => {
        const featureEl = document.createElement('div');
        featureEl.className = 'text-center p-8 bg-white rounded-3xl shadow-xl hover-scale hover:shadow-2xl transition-all duration-300';
        featureEl.innerHTML = `
            <div class="w-16 h-16 bg-gradient-to-r from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-6 text-white text-2xl">
                <i class="fas fa-music"></i>
            </div>
            <h3 class="text-xl font-bold mb-4 text-gray-800">${feature}</h3>
        `;
        grid.appendChild(featureEl);
    });
}

// STEP 7: Reviews System
function renderReviews() {
    const container = document.getElementById('reviewsContainer');

    product.reviews.forEach(review => {
        const reviewEl = document.createElement('div');
        reviewEl.className = 'bg-white p-8 rounded-3xl shadow-xl hover-scale';

        let stars = '';

        for (let i = 0; i < 5; i++) {
            stars += i < review.rating
                ? '<i class="fas fa-star text-yellow-400"></i>'
                : '<i class="far fa-star text-gray-300"></i>';
        }

        reviewEl.innerHTML = `
            <div class="flex items-center mb-4">
                ${stars}
            </div>

            <p class="text-gray-700 mb-4">
                ${review.comment}
            </p>

            <div class="text-sm text-gray-500">
                <strong>${review.user}</strong> • ${review.date}
            </div>
        `;

        container.appendChild(reviewEl);
    });
}


// STEP 8: Render Cart
ShoppingCart.prototype.renderCart = function() {

    const cartItems = document.getElementById("cartItems");
    const cartTotal = document.getElementById("cartTotal");

    cartItems.innerHTML = "";

    if(this.items.length === 0){
        cartItems.innerHTML = "<p class='text-gray-500'>Cart is empty</p>";
        cartTotal.textContent = "₹0";
        return;
    }

    this.items.forEach((item,index)=>{

        const itemEl = document.createElement("div");

        itemEl.className = "flex justify-between items-center mb-6";

        itemEl.innerHTML = `
            <div class="flex items-center gap-4">

                <img src="${item.image}" 
                class="w-16 h-16 rounded-xl object-cover">

                <div>
                    <div class="font-bold">${item.product}</div>
                    <div class="text-sm text-gray-500">${item.color}</div>
                    <div class="text-blue-600 font-bold">₹${item.price}</div>
                </div>

            </div>

            <div class="flex items-center gap-2">

                <button onclick="cart.updateQuantity(${index},${item.quantity-1})"
                class="px-2 py-1 bg-gray-200 rounded">-</button>

                <span>${item.quantity}</span>

                <button onclick="cart.updateQuantity(${index},${item.quantity+1})"
                class="px-2 py-1 bg-gray-200 rounded">+</button>

                <button onclick="cart.removeItem(${index})"
                class="ml-3 text-red-500">
                <i class="fas fa-trash"></i>
                </button>

            </div>
        `;

        cartItems.appendChild(itemEl);

    });

    cartTotal.textContent = "₹" + this.getTotal();
};


// STEP 9: Button Events

document.getElementById("addToCartBtn").addEventListener("click", ()=>{

    cart.addItem(product,currentColor,1);

    cart.renderCart();

});


document.getElementById("cartBtn").addEventListener("click",()=>{

    document.getElementById("cartModal").classList.remove("hidden");

    cart.renderCart();

});


document.getElementById("closeCart").addEventListener("click",()=>{

    document.getElementById("cartModal").classList.add("hidden");

});


document.getElementById("checkoutBtn").addEventListener("click",()=>{

    document.getElementById("checkoutModal").classList.remove("hidden");

});


// STEP 10: Razorpay Payment

document.getElementById("checkoutForm").addEventListener("submit",function(e){

    e.preventDefault();

    const options = {

        key: "YOUR_RAZORPAY_KEY",

        amount: cart.getTotal()*100,

        currency: "INR",

        name: "Trinity Audio",

        description: "Headphones Purchase",

        handler: function(response){

            alert("Payment Successful!");

            cart.clear();

            location.reload();

        },

        prefill:{

            name: document.getElementById("customerName").value,

            contact: document.getElementById("customerPhone").value

        },

        theme:{

            color:"#6366F1"

        }

    };

    const rzp = new Razorpay(options);

    rzp.open();

});
